<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Jayasom Wireframes · V3</title>
  <style>
/* === JAYASOM DESIGN TOKENS (locked, do not modify) === */
:root {
  --background: 16 33% 93%;
  --foreground: 300 2% 27%;
  --card: 16 33% 93%;
  --card-foreground: 300 2% 27%;
  --muted: 16 20% 86%;
  --muted-foreground: 300 2% 40%;
  --accent: 16 20% 86%;
  --accent-foreground: 300 2% 27%;
  --border: 300 2% 60%;
  --input: 300 2% 60%;
  --primary: 300 2% 27%;
  --primary-foreground: 16 33% 93%;
  --wire-placeholder: 16 20% 88%;
  --wire-line: 300 2% 55%;
  --wire-dark: 300 2% 30%;
  --wire-mid: 300 2% 45%;
  --radius: 0rem;
}

* { box-sizing: border-box; margin: 0; padding: 0; border: 0 solid hsl(var(--border)); }
ul, ol { list-style: none; }
a { color: inherit; text-decoration: none; }

html, body {
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  font-family: 'Century Gothic', 'Didact Gothic', 'Futura', 'Trebuchet MS', Arial, sans-serif;
  font-weight: 300;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* === TYPOGRAPHY === */
.eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin-bottom: 12px; }
.h-hero { font-size: 36px; font-weight: 300; color: hsl(var(--foreground)); margin-bottom: 16px; line-height: 1.15; }
.h-section { font-size: 28px; font-weight: 300; color: hsl(var(--foreground)); margin-bottom: 16px; line-height: 1.2; }
.h-card { font-size: 16px; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 8px; letter-spacing: 0.02em; }
.body-copy { font-size: 14px; color: hsl(var(--muted-foreground)); line-height: 1.65; max-width: 640px; }
.caption { font-size: 12px; color: hsl(var(--muted-foreground)); line-height: 1.6; }
.label-tiny { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }

/* === LAYOUT === */
.shell { max-width: 1152px; margin: 0 auto; padding: 0 32px; }
.section { padding: 64px 32px; }
.section-tight { padding: 32px; }

/* === HERO === */
.intro { padding: 96px 32px 64px; }
.intro .shell { max-width: 720px; }
.intro .body-copy { max-width: 560px; margin-top: 8px; }

/* === PAGE LIST === */
.page-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px 24px;
}
@media (max-width: 768px) { .page-list { grid-template-columns: 1fr; } }

.page-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 18px 24px;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  transition: background 160ms ease, border-color 160ms ease;
}
.page-row .num {
  font-size: 13px;
  font-weight: 300;
  color: hsl(var(--muted-foreground));
  padding-right: 20px;
  border-right: 1px solid hsl(var(--border));
}
.page-row .title {
  font-size: 15px;
  font-weight: 300;
  color: hsl(var(--foreground));
  line-height: 1.3;
}
.page-row .arrow {
  font-size: 16px;
  color: hsl(var(--muted-foreground));
  line-height: 1;
  transition: transform 160ms ease, color 160ms ease;
}
.page-row:hover { background: hsl(var(--muted)); border-color: hsl(var(--foreground)); }
.page-row:hover .arrow { color: hsl(var(--foreground)); transform: translateX(4px); }

  </style>
</head>
<body>

<section class="intro">
  <div class="shell">
    <h1 class="h-hero">JAYASOM CONTENT WIREFRAMES</h1>
  </div>
</section>

<section class="section-tight">
  <div class="shell">
    <div class="page-list">

      <a class="page-row" href="wireframe-homepage-v3.html">

        <span class="title">Homepage</span>
        <span class="arrow">→</span>
      </a>

      <a class="page-row" href="wireframe-about-us-v3.html">
        <span class="num">02</span>
        <span class="title">About Us</span>
        <span class="arrow">→</span>
      </a>

      <a class="page-row" href="wireframe-as-a-woman-v3.html">
        <span class="num">03</span>
        <span class="title">As a Woman</span>
        <span class="arrow">→</span>
      </a>

      <a class="page-row" href="wireframe-as-a-pair-v3.html">
        <span class="num">04</span>
        <span class="title">As a Pair</span>
        <span class="arrow">→</span>
      </a>

      <a class="page-row" href="wireframe-as-a-family-v3.html">
        <span class="num">05</span>
        <span class="title">As a Family</span>
        <span class="arrow">→</span>
      </a>

    </div>
  </div>
</section>

</body>
</html>
